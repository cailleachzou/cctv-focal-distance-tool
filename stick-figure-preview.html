<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>小人预览 — 工程风极简线条</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "IBM Plex Mono", "Noto Sans SC", monospace;
    background: #0a0d11;
    color: #e8ecef;
    padding: 40px;
    min-height: 100vh;
    background-image:
      linear-gradient(#0e1218 1px, transparent 1px),
      linear-gradient(90deg, #0e1218 1px, transparent 1px);
    background-size: 40px 40px;
  }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 8px; letter-spacing: 1px; }
  .sub { font-size: 11px; color: #4f5864; letter-spacing: 1.5px; margin-bottom: 32px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    max-width: 960px;
  }
  .card {
    background: #11161c;
    border: 1px solid #232c37;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s;
  }
  .card:hover, .card.selected { border-color: #00d4ff; }
  .card.selected::after {
    content: "SELECTED";
    display: block;
    font-size: 10px;
    color: #00d4ff;
    letter-spacing: 2px;
    margin-top: 12px;
  }
  .card-label {
    font-size: 11px;
    color: #8a949e;
    letter-spacing: 1.5px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  svg { display: block; margin: 0 auto; }
  .desc {
    margin-top: 16px;
    font-size: 11px;
    color: #4f5864;
    line-height: 1.6;
    letter-spacing: .3px;
  }
  .context-section {
    margin-top: 40px;
    padding: 24px;
    background: #11161c;
    border: 1px solid #232c37;
    max-width: 960px;
  }
  .context-title {
    font-size: 12px;
    color: #8a949e;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .ctx-row {
    display: flex;
    align-items: flex-end;
    gap: 40px;
    margin-bottom: 24px;
  }
  .ctx-row:last-child { margin-bottom: 0; }
  .ctx-label {
    font-size: 10px;
    color: #4f5864;
    letter-spacing: 1px;
    min-width: 80px;
    padding-bottom: 4px;
  }
</style>
</head>
<body>

<h1>极简线条小人 — 工程风</h1>
<div class="sub">3 种方案 · 点击选择 · 固定身高 1.75m</div>

<div class="grid">

  <!-- 方案 A: 圆头 + 竖线身体 + 倒V腿 -->
  <div class="card selected" onclick="select(this)">
    <div class="card-label">A — 经典工程人</div>
    <svg width="80" height="120" viewBox="0 0 80 120">
      <!-- 1.75m = ~42px at default scale, preview scaled up for visibility -->
      <circle cx="40" cy="14" r="7" fill="none" stroke="#00d4ff" stroke-width="2"/>
      <line x1="40" y1="21" x2="40" y2="68" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
      <line x1="40" y1="68" x2="24" y2="100" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
      <line x1="40" y1="68" x2="56" y2="100" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
      <!-- 身高标注线 -->
      <line x1="62" y1="7" x2="62" y2="100" stroke="#4f5864" stroke-width="0.8" stroke-dasharray="2,2"/>
      <line x1="58" y1="7" x2="66" y2="7" stroke="#4f5864" stroke-width="0.8"/>
      <line x1="58" y1="100" x2="66" y2="100" stroke="#4f5864" stroke-width="0.8"/>
      <text x="62" y="56" fill="#4f5864" font-size="8" text-anchor="middle" font-family="IBM Plex Mono" transform="rotate(-90,62,56)">1.75m</text>
    </svg>
    <div class="desc">圆头 · 单竖线躯干 · 倒 V 双腿<br/>最简洁，工程图标配</div>
  </div>

  <!-- 方案 B: 圆头 + T形手臂 + 倒V腿 -->
  <div class="card" onclick="select(this)">
    <div class="card-label">B — 带手臂</div>
    <svg width="80" height="120" viewBox="0 0 80 120">
      <circle cx="40" cy="14" r="7" fill="none" stroke="#00d4ff" stroke-width="2"/>
      <line x1="40" y1="21" x2="40" y2="68" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
      <line x1="24" y1="36" x2="56" y2="36" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
      <line x1="40" y1="68" x2="24" y2="100" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
      <line x1="40" y1="68" x2="56" y2="100" stroke="#00d4ff" stroke-width="2" stroke-linecap="round"/>
      <line x1="62" y1="7" x2="62" y2="100" stroke="#4f5864" stroke-width="0.8" stroke-dasharray="2,2"/>
      <line x1="58" y1="7" x2="66" y2="7" stroke="#4f5864" stroke-width="0.8"/>
      <line x1="58" y1="100" x2="66" y2="100" stroke="#4f5864" stroke-width="0.8"/>
      <text x="62" y="56" fill="#4f5864" font-size="8" text-anchor="middle" font-family="IBM Plex Mono" transform="rotate(-90,62,56)">1.75m</text>
    </svg>
    <div class="desc">圆头 · T 形手臂 · 倒 V 双腿<br/>加了手臂，更像"人"</div>
  </div>

  <!-- 方案 C: 方头 + 粗线身体 + 倒V腿 -->
  <div class="card" onclick="select(this)">
    <div class="card-label">C — 硬朗方头</div>
    <svg width="80" height="120" viewBox="0 0 80 120">
      <rect x="33" y="7" width="14" height="14" rx="2" fill="none" stroke="#00d4ff" stroke-width="2"/>
      <line x1="40" y1="21" x2="40" y2="68" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="40" y1="68" x2="24" y2="100" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="40" y1="68" x2="56" y2="100" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="62" y1="7" x2="62" y2="100" stroke="#4f5864" stroke-width="0.8" stroke-dasharray="2,2"/>
      <line x1="58" y1="7" x2="66" y2="7" stroke="#4f5864" stroke-width="0.8"/>
      <line x1="58" y1="100" x2="66" y2="100" stroke="#4f5864" stroke-width="0.8"/>
      <text x="62" y="56" fill="#4f5864" font-size="8" text-anchor="middle" font-family="IBM Plex Mono" transform="rotate(-90,62,56)">1.75m</text>
    </svg>
    <div class="desc">方头 · 粗线躯干 · 倒 V 双腿<br/>更硬朗，偏 CAD 标注风格</div>
  </div>

</div>

<!-- 场景模拟：放在实际 SVG 比例中看效果 -->
<div class="context-section">
  <div class="context-title">实际比例预览 — 在 30m 场景中（4mm @ 4MP · 1/2.8" · 高 2.8m · 俯角 19.3°）</div>
  <div class="ctx-row">
    <div class="ctx-label">A</div>
    <svg width="780" height="120" viewBox="0 0 780 120">
      <!-- ground -->
      <line x1="60" y1="110" x2="770" y2="110" stroke="#2e3845" stroke-width="1.5"/>
      <!-- scale ticks -->
      <text x="60" y="120" fill="#4f5864" font-size="9" font-family="IBM Plex Mono">0m</text>
      <text x="283" y="120" fill="#4f5864" font-size="9" font-family="IBM Plex Mono">5m</text>
      <text x="506" y="120" fill="#4f5864" font-size="9" font-family="IBM Plex Mono">10m</text>
      <text x="729" y="120" fill="#4f5864" font-size="9" font-family="IBM Plex Mono">15m</text>
      <line x1="60" y1="107" x2="60" y2="113" stroke="#4f5864" stroke-width="0.8"/>
      <line x1="283" y1="107" x2="283" y2="113" stroke="#4f5864" stroke-width="0.8"/>
      <line x1="506" y1="107" x2="506" y2="113" stroke="#4f5864" stroke-width="0.8"/>
      <line x1="729" y1="107" x2="729" y2="113" stroke="#4f5864" stroke-width="0.8"/>
      <!-- blind zone hatch -->
      <rect x="60" y="50" width="147" height="60" fill="#ff3d57" fill-opacity="0.08"/>
      <!-- person at 1.5m (in blind zone) - height ~28px for 1.75m -->
      <g transform="translate(93, 0)">
        <circle cx="0" cy="82" r="3.5" fill="none" stroke="#00d4ff" stroke-width="1.2"/>
        <line x1="0" y1="85.5" x2="0" y2="108" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="0" y1="108" x2="-7" y2="110" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="0" y1="108" x2="7" y2="110" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round"/>
      </g>
      <!-- camera -->
      <rect x="54" y="36" width="12" height="7" fill="#00d4ff" stroke="#06090d" stroke-width="1"/>
      <polygon points="66,38 71,39.5 66,41" fill="#00d4ff"/>
      <text x="390" y="18" fill="#8a949e" font-size="10" text-anchor="middle" font-family="IBM Plex Mono" letter-spacing="1.5">小人在盲区内 · 摄像机看不到</text>
    </svg>
  </div>
  <div class="ctx-row">
    <div class="ctx-label">B</div>
    <svg width="780" height="120" viewBox="0 0 780 120">
      <line x1="60" y1="110" x2="770" y2="110" stroke="#2e3845" stroke-width="1.5"/>
      <text x="60" y="120" fill="#4f5864" font-size="9" font-family="IBM Plex Mono">0m</text>
      <text x="283" y="120" fill="#4f5864" font-size="9" font-family="IBM Plex Mono">5m</text>
      <text x="506" y="120" fill="#4f5864" font-size="9" font-family="IBM Plex Mono">10m</text>
      <text x="729" y="120" fill="#4f5864" font-size="9" font-family="IBM Plex Mono">15m</text>
      <line x1="60" y1="107" x2="60" y2="113" stroke="#4f5864" stroke-width="0.8"/>
      <line x1="283" y1="107" x2="283" y2="113" stroke="#4f5864" stroke-width="0.8"/>
      <line x1="506" y1="107" x2="506" y2="113" stroke="#4f5864" stroke-width="0.8"/>
      <line x1="729" y1="107" x2="729" y2="113" stroke="#4f5864" stroke-width="0.8"/>
      <!-- person at 7m (in R zone) -->
      <g transform="translate(370, 0)">
        <circle cx="0" cy="82" r="3.5" fill="none" stroke="#00d4ff" stroke-width="1.2"/>
        <line x1="0" y1="85.5" x2="0" y2="108" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="-8" y1="94" x2="8" y2="94" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="0" y1="108" x2="-7" y2="110" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="0" y1="108" x2="7" y2="110" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round"/>
      </g>
      <rect x="60" y="50" width="147" height="60" fill="#ff3d57" fill-opacity="0.08"/>
      <rect x="54" y="36" width="12" height="7" fill="#00d4ff" stroke="#06090d" stroke-width="1"/>
      <polygon points="66,38 71,39.5 66,41" fill="#00d4ff"/>
      <text x="390" y="18" fill="#8a949e" font-size="10" text-anchor="middle" font-family="IBM Plex Mono" letter-spacing="1.5">小人在 R 识别区 · 可认出人脸</text>
    </svg>
  </div>
  <div class="ctx-row">
    <div class="ctx-label">C</div>
    <svg width="780" height="120" viewBox="0 0 780 120">
      <line x1="60" y1="110" x2="770" y2="110" stroke="#2e3845" stroke-width="1.5"/>
      <text x="60" y="120" fill="#4f5864" font-size="9" font-family="IBM Plex Mono">0m</text>
      <text x="283" y="120" fill="#4f5864" font-size="9" font-family="IBM Plex Mono">5m</text>
      <text x="506" y="120" fill="#4f5864" font-size="9" font-family="IBM Plex Mono">10m</text>
      <text x="729" y="120" fill="#4f5864" font-size="9" font-family="IBM Plex Mono">15m</text>
      <line x1="60" y1="107" x2="60" y2="113" stroke="#4f5864" stroke-width="0.8"/>
      <line x1="283" y1="107" x2="283" y2="113" stroke="#4f5864" stroke-width="0.8"/>
      <line x1="506" y1="107" x2="506" y2="113" stroke="#4f5864" stroke-width="0.8"/>
      <line x1="729" y1="107" x2="729" y2="113" stroke="#4f5864" stroke-width="0.8"/>
      <!-- person at 12m (in O zone) -->
      <g transform="translate(560, 0)">
        <rect x="-4" y="82" width="8" height="8" rx="1.5" fill="none" stroke="#00d4ff" stroke-width="1.4"/>
        <line x1="0" y1="90" x2="0" y2="108" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="0" y1="108" x2="-7" y2="110" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="0" y1="108" x2="7" y2="110" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      <rect x="60" y="50" width="147" height="60" fill="#ff3d57" fill-opacity="0.08"/>
      <rect x="54" y="36" width="12" height="7" fill="#00d4ff" stroke="#06090d" stroke-width="1"/>
      <polygon points="66,38 71,39.5 66,41" fill="#00d4ff"/>
      <text x="390" y="18" fill="#8a949e" font-size="10" text-anchor="middle" font-family="IBM Plex Mono" letter-spacing="1.5">小人在 O 观察区 · 能看清姿态</text>
    </svg>
  </div>
</div>

<script>
function select(el) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}
</script>
</body>
</html>
